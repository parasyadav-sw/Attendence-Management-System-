services:
  - type: web
    name: attendance-management-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          type: postgres
          name: attendance-db
      - key: TIMEZONE
        value: "Asia/Kolkata"

databases:
  - name: attendance-db
    plan: free
    databaseName: attendance
    ipAllowList: []
