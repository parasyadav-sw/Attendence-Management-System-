{% extends "base.html" %}
{% block title %}Add Class - ParaScan{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>Add New Class</h1><p>Create a new class for organizing students</p></div>
    <a href="{{ url_for('class_list') }}" class="btn btn-secondary"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> Back</a>
</div>
<div class="form-container" style="max-width:560px">
    <h2><i data-lucide="book-open" style="width:18px;height:18px"></i> Class Information</h2>
    <form method="POST" action="{{ url_for('class_add') }}">
        <div class="form-group"><label><i data-lucide="tag" style="width:14px;height:14px"></i> Class Name *</label><input type="text" name="name" required placeholder="e.g., FY BCA, SY BCA, TY BCA"></div>
        <div class="form-grid-2">
            <div class="form-group"><label><i data-lucide="layers" style="width:14px;height:14px"></i> Division</label><input type="text" name="division" placeholder="e.g., A, B, C"></div>
            <div class="form-group"><label><i data-lucide="building-2" style="width:14px;height:14px"></i> Department</label><input type="text" name="department" placeholder="e.g., Computer Science"></div>
        </div>
        <div class="form-group"><label><i data-lucide="calendar" style="width:14px;height:14px"></i> Academic Year</label><input type="text" name="academic_year" placeholder="e.g., 2024-2025"></div>
        <button type="submit" class="btn btn-block" style="margin-top:8px"><i data-lucide="save" style="width:16px;height:16px"></i> Create Class</button>
    </form>
</div>
{% endblock %}
