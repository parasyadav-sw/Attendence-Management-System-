{% extends "admin_base.html" %}
{% block title %}Add Faculty - ParaScan{% endblock %}
{% block content %}
<div class="page-header">
    <div><h1>Add New Faculty</h1><p>Create a new faculty account</p></div>
    <a href="{{ url_for('admin_faculty_list') }}" class="btn btn-secondary"><i data-lucide="arrow-left" style="width:16px;height:16px"></i> Back</a>
</div>
<div class="form-container" style="max-width:640px">
    <h2><i data-lucide="user-plus" style="width:18px;height:18px"></i> Faculty Registration</h2>
    <form method="POST" action="{{ url_for('admin_faculty_add') }}">
        <div class="form-grid-2">
            <div class="form-group"><label><i data-lucide="user" style="width:14px;height:14px"></i> Name *</label><input type="text" name="name" required placeholder="Full name"></div>
            <div class="form-group"><label><i data-lucide="credit-card" style="width:14px;height:14px"></i> Faculty ID *</label><input type="text" name="faculty_id" required placeholder="e.g., FAC001"></div>
            <div class="form-group"><label><i data-lucide="building-2" style="width:14px;height:14px"></i> Department</label><input type="text" name="department" placeholder="e.g., Computer Science"></div>
            <div class="form-group"><label><i data-lucide="mail" style="width:14px;height:14px"></i> Email</label><input type="email" name="email" placeholder="faculty@example.com"></div>
            <div class="form-group"><label><i data-lucide="phone" style="width:14px;height:14px"></i> Mobile</label><input type="text" name="mobile" placeholder="10-digit mobile"></div>
            <div class="form-group"><label><i data-lucide="at-sign" style="width:14px;height:14px"></i> Username *</label><input type="text" name="username" required placeholder="Login username"></div>
            <div class="form-group"><label><i data-lucide="lock" style="width:14px;height:14px"></i> Password *</label><input type="password" name="password" required placeholder="Set password"></div>
            <div class="form-group"><label><i data-lucide="lock" style="width:14px;height:14px"></i> Confirm *</label><input type="password" name="confirm_password" required placeholder="Confirm password"></div>
        </div>
        <button type="submit" class="btn btn-block" style="margin-top:8px"><i data-lucide="save" style="width:16px;height:16px"></i> Create Faculty</button>
    </form>
</div>
{% endblock %}
